<div id="request-detail-popup" class="popup-overlay" style="display: none;">
    <div class="ge-detail-card">
        <div class="ge-detail-header">
            <h3>Chi tiết yêu cầu</h3>
            <button type="button" class="btn-close-x" id="detail-close-btn">&times;</button>
        </div>

        <div class="ge-detail-body">
            <div class="ge-employee-profile">
                <div class="ge-avatar-circle">
                    <img src="{% static 'images/default_avatar.png' %}" alt="User">
                </div>
                <div class="ge-profile-text">
                    <h4 id="detail-employee-name">Nguyễn Văn An</h4>
                    <p id="detail-employee-code">Mã nhân viên - NV001</p>
                </div>
            </div>

            <div class="ge-info-rows">
                <div class="ge-info-row">
                    <span class="ge-label">Mã nhân viên:</span>
                    <span id="detail-emp-code" class="ge-value">NV001</span>
                </div>
                <div class="ge-info-row gray-bg">
                    <span class="ge-label">Loại yêu cầu:</span>
                    <span id="detail-request-type" class="ge-value">Nghỉ phép</span>
                </div>
                <div class="ge-info-row">
                    <span class="ge-label">Ngày bắt đầu:</span>
                    <span id="detail-date-start" class="ge-value">26/12/2026</span>
                </div>
                <div class="ge-info-row gray-bg">
                    <span class="ge-label">Ngày kết thúc:</span>
                    <span id="detail-date-end" class="ge-value">27/12/2026</span>
                </div>
                <div class="ge-info-row">
                    <span class="ge-label">Lý do:</span>
                    <span id="detail-reason" class="ge-value">Đi khám sức khỏe</span>
                </div>
                <div class="ge-info-row gray-bg">
                    <span class="ge-label">Ngày đăng ký:</span>
                    <span id="detail-date-reg" class="ge-value">25/12/2026</span>
                </div>
            </div>

            <div class="ge-detail-actions">
                <button type="button" class="btn-ge-approve" id="btn-approve">✔ Duyệt</button>
                <button type="button" class="btn-ge-reject" id="btn-reject">✖ Từ chối</button>
            </div>
        </div>
    </div>
</div>
