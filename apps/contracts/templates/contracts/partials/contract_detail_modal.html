<div class="contract-detail-overlay" id="contract-detail-popup">
    <div class="contract-detail-modal">
        <div class="contract-detail-header">

        </div>
        <div class="contract-detail-employee">
            <div class="contract-avatar">HD</div>

            <div class="contract-detail-row">
                <span>Ngày bắt đầu:</span>

                <strong id="detail-end-date">25/12/2026</strong>
            </div>
            <div class="contract-detail-row">
                <span>Mức lương:</span>
                <strong id="detail-salary">2.000.000</strong>

            <div class="contract-detail-row alt">
