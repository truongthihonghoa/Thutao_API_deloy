<!-- Employee Detail Popup Modal -->
<div id="employee-detail-popup" class="popup-overlay" style="display: none;">
    <div class="popup-content">
        <div class="popup-header">
            <h3>Thông tin nhân viên</h3>
            <button type="button" id="detail-close-btn" class="close-btn">&times;</button>
        </div>
        <div class="popup-body">
            <div class="detail-row">
                <span class="detail-label">Mã nhân viên:</span>
                <span id="detail-ma-nv" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Họ tên:</span>
                <span id="detail-ho-ten" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Giới tính:</span>
                <span id="detail-gioi-tinh" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Ngày sinh:</span>
                <span id="detail-ngay-sinh" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">CCCD:</span>
                <span id="detail-cccd" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Số điện thoại:</span>
                <span id="detail-sdt" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Số tài khoản:</span>
                <span id="detail-stk" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Chức vụ:</span>
                <span id="detail-chuc-vu" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Vị trí việc làm:</span>
                <span id="detail-vi-tri" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Địa chỉ thường trú:</span>
                <span id="detail-dia-chi-thuong-tru" class="detail-value"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Địa chỉ tạm trú:</span>
                <span id="detail-dia-chi-tam-tru" class="detail-value"></span>
            </div>
        </div>
    </div>
</div>
