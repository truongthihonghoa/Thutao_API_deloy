        <div class="heading">XÁC NHẬN XÓA</div>
        <p class="message-line1">Bạn có chắc chắn muốn xóa nhân viên này?</p>
        <p class="message-line2">Dữ liệu sẽ được chuyển sang trạng thái <span class="highlight">&quot;Ngừng hoạt động&quot;.</span></p>
        <button class="no-btn" id="delete-popup-no-btn">Không</button>
        <button class="yes-btn" id="delete-popup-yes-btn">Đồng ý</button>
    </div>
</div>
