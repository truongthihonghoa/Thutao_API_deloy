{% load static %}
<div class="error-popup-overlay" id="error-popup">
    <div class="error-popup-box">
        <img class="error-icon" src="{% static 'employees/img/error_icon.png' %}" alt="Error" />
        <div class="heading" id="error-popup-title">THÔNG BÁO LỖI</div>
        <p class="message-line1" id="error-popup-message1"></p>
        <p class="message-line2" id="error-popup-message2"></p>
        <button class="exit-btn" id="error-popup-exit-btn">Thoát</button>
        <button class="back-btn" id="error-popup-back-btn">Quay lại</button>
    </div>
</div>
